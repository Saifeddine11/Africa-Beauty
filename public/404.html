<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Page introuvable · Africa Beauty</title>
    <style>
      :root {
        --brun: #3a2215;
        --terra: #c2714a;
        --lin: #e8ddd0;
        --ow: #faf6f0;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Josefin Sans", "Avenir Next", Arial, sans-serif;
        background:
          radial-gradient(circle at 12% 12%, rgba(194, 113, 74, 0.24), transparent 28rem),
          linear-gradient(135deg, var(--brun) 0%, #6b3a25 42%, var(--lin) 42%, var(--ow) 100%);
        color: var(--brun);
      }

      .page {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: clamp(18px, 4vw, 48px);
      }

      .card {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(320px, 0.72fr);
        width: min(100%, 1080px);
        overflow: hidden;
        border: 1px solid rgba(250, 246, 240, 0.18);
        border-radius: clamp(28px, 4vw, 48px);
        background: rgba(250, 246, 240, 0.95);
        box-shadow: 0 30px 90px rgba(28, 16, 8, 0.22);
      }

      .visual {
        display: flex;
        min-height: 560px;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(28px, 5vw, 58px);
        background:
          linear-gradient(90deg, rgba(58, 34, 21, 0.88), rgba(58, 34, 21, 0.48)),
          url("/images/salon-africa-beauty.webp") center / cover no-repeat;
        color: var(--ow);
      }

      .brand {
        width: fit-content;
        color: var(--ow);
        font-size: clamp(24px, 3vw, 42px);
        font-weight: 800;
        letter-spacing: 4px;
        text-decoration: none;
        text-transform: uppercase;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: rgba(250, 246, 240, 0.72);
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      .code {
        display: block;
        color: var(--ow);
        font-size: clamp(84px, 14vw, 160px);
        font-weight: 900;
        letter-spacing: -4px;
        line-height: 0.82;
      }

      .content {
        display: flex;
        min-height: 560px;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
        padding: clamp(28px, 5vw, 56px);
      }

      .status {
        width: fit-content;
        border: 1px solid rgba(194, 113, 74, 0.18);
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(194, 113, 74, 0.1);
        color: var(--terra);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--brun);
        font-size: clamp(38px, 5vw, 62px);
        font-weight: 800;
        line-height: 0.96;
      }

      p {
        max-width: 38ch;
        margin: 0;
        color: rgba(58, 34, 21, 0.68);
        font-size: clamp(15px, 1.6vw, 18px);
        font-weight: 300;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .btn {
        display: inline-flex;
        min-height: 50px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 22px;
        background: var(--brun);
        color: var(--ow);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 2px;
        text-decoration: none;
        text-transform: uppercase;
      }

      .btn.secondary {
        border: 1px solid rgba(58, 34, 21, 0.12);
        background: rgba(58, 34, 21, 0.06);
        color: var(--brun);
      }

      @media (max-width: 820px) {
        body {
          background: linear-gradient(180deg, var(--brun) 0%, #6b3a25 34%, var(--ow) 34%, var(--ow) 100%);
        }

        .card {
          grid-template-columns: 1fr;
        }

        .visual {
          min-height: 330px;
        }

        .content {
          min-height: auto;
          padding: 28px 22px 26px;
        }

        .actions {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card" aria-labelledby="error-title">
        <div class="visual" aria-hidden="true">
          <a class="brand" href="/">Africa Beauty</a>
          <div>
            <p class="eyebrow">Page introuvable</p>
            <span class="code">404</span>
          </div>
        </div>
        <div class="content">
          <span class="status">Lien incorrect</span>
          <h1 id="error-title">Cette page n’existe pas.</h1>
          <p>Le lien demandé ne correspond à aucune page active du site Africa Beauty.</p>
          <div class="actions">
            <a class="btn" href="/">Retour à l’accueil</a>
            <a class="btn secondary" href="/rendez-vous">Prendre rendez-vous</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
